<div class="container">
  <div class="row">
    <div class="col-md-10">
      <table class="table table-bordered table-border-collapse">
        <thead>
          <tr>
            <th>S.No</th>
            <th>Name</th>
            <th>Username</th>
            <th>Address</th>
            <th>Phone</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of users">
            <td>{{u.id}}</td>
            <td>{{u.name}}</td>
            <td>{{u.username}}</td>
            <td>{{u.address.city}}</td>
            <td>{{u.phone}}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
